<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scale Degree & Chord Extension Flashcards</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <button type="button" class="icon-btn" id="btn-settings" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <h1 class="title">Scale Degree & Chord Extension Flashcards</h1>
    <div class="header-actions">
      <button type="button" class="icon-btn" id="btn-sound" title="Sound on/off" aria-label="Sound">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5zm4.54 4.46a5 5 0 0 1 0 7.07"/></svg>
      </button>
      <button type="button" class="icon-btn" id="btn-theme" title="Toggle light/dark" aria-label="Theme">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="moon-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <nav class="mode-tabs">
    <button type="button" class="mode-tab active" data-mode="practice">Practice</button>
    <button type="button" class="mode-tab" data-mode="challenge">60s Challenge</button>
  </nav>

  <section class="stats-bar">
    <div class="stat correct"><span class="stat-icon">✓</span><span class="stat-value" id="stat-correct">0</span></div>
    <div class="stat incorrect"><span class="stat-icon">×</span><span class="stat-value" id="stat-incorrect">0</span></div>
    <div class="stat accuracy"><span class="stat-icon">◎</span><span class="stat-value" id="stat-accuracy">—</span></div>
    <button type="button" class="btn btn-secondary" id="btn-results">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M3 3v18h18M7 16l4-8 4 4 4-6"/></svg>
      View Results
    </button>
    <div class="challenge-timer hidden" id="challenge-timer">60s</div>
  </section>

  <div class="feedback feedback-error hidden" id="feedback" role="alert">
    <span class="feedback-icon">×</span>
    <span class="feedback-text" id="feedback-text"></span>
  </div>

  <main class="main">
    <div class="card start-card" id="start-card">
      <p class="start-message">Choose your mode above, then click to begin.</p>
      <button type="button" class="btn btn-start" id="btn-start-game">Start game</button>
    </div>
    <div class="game-content hidden" id="game-content">
    <div class="card question-card">
      <p class="question-text" id="question-text">What note is the <span class="highlight" id="q-extension">#11</span> of <span class="highlight" id="q-root">D</span> ?</p>
      <button type="button" class="btn btn-flip" id="btn-flip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        FLIP
      </button>
    </div>

    <div class="card answer-card">
      <h2 class="answer-label">CLICK A KEY TO ANSWER:</h2>
      <div class="piano-keyboard" id="piano-keyboard"></div>
    </div>
    </div>
  </main>

  <aside class="modal hidden" id="modal-settings" aria-modal="true" aria-labelledby="modal-settings-title">
    <div class="modal-backdrop" id="modal-settings-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-settings-title">Settings</h2>
        <button type="button" class="icon-btn modal-close" id="modal-settings-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <fieldset class="settings-group">
          <legend>Root notes to test</legend>
          <div class="settings-checkboxes" id="settings-roots"></div>
        </fieldset>
        <fieldset class="settings-group">
          <legend>Extensions to test</legend>
          <div class="settings-checkboxes" id="settings-extensions"></div>
        </fieldset>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" id="btn-settings-apply">Apply</button>
      </div>
    </div>
  </aside>

  <aside class="modal hidden" id="modal-results" aria-modal="true" aria-labelledby="modal-results-title">
    <div class="modal-backdrop" id="modal-results-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-results-title">Results</h2>
        <button type="button" class="icon-btn modal-close" id="modal-results-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="results-summary" id="results-summary"></div>
        <div class="results-mistakes" id="results-mistakes"></div>
      </div>
    </div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
